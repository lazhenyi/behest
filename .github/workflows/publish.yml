name: Publish

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          packages=(
            behest-core
            behest-provider
            behest-context
            behest-event
            behest-tool
            behest-memory
            behest-approval
            behest-store
            behest-adapter-openai
            behest-adapter-anthropic
            behest-runtime
            behest
          )

          crate_version_exists() {
            local crate="$1"
            curl --silent --fail "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null
          }

          publish_one() {
            local crate="$1"
            local log_file
            log_file="$(mktemp)"

            for attempt in {1..20}; do
              if crate_version_exists "$crate"; then
                echo "${crate} ${version} already exists on crates.io; skipping"
                return 0
              fi

              echo "Publishing ${crate} ${version} (attempt ${attempt})"
              if cargo publish -p "$crate" --locked 2>&1 | tee "$log_file"; then
                return 0
              fi

              if grep -Eiq "already uploaded|already exists|previously uploaded" "$log_file"; then
                echo "${crate} ${version} was already uploaded; continuing"
                return 0
              fi

              if grep -Eiq "failed to select a version|no matching package named|required by package" "$log_file"; then
                echo "crates.io index has not caught up for ${crate}; retrying"
                sleep 30
                continue
              fi

              return 1
            done

            echo "failed to publish ${crate} ${version} after retries" >&2
            return 1
          }

          for crate in "${packages[@]}"; do
            publish_one "$crate"
          done
